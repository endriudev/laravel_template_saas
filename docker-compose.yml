name: laravel_template_saas

services:
  app:
    dns:
      - 8.8.8.8
      - 1.1.1.1
    image: ${APP_IMAGE:-laravel-app-base:dev}
    working_dir: /var/www
    volumes:
      - ./:/var/www
    restart: no
    depends_on:
      - postgres
    networks:
      - app
      - dev-shared
    ports:
      - "${VITE_PORT:-5173}:5173"

  nginx:
    image: nginx:alpine
    restart: no
    ports:
      - "${APP_PORT:-80}:80"
    environment:
      FASTCGI_PASS: app:9000
    volumes:
      - ./public:/var/www/public
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/default.conf:/etc/nginx/templates/default.conf.template
    depends_on:
      - app
    networks:
      - app

  postgres:
    image: postgres:latest
    restart: no
    ports:
      - "${DB_FORWARD_PORT:-5432}:5432"
    env_file:
      - .env
    volumes:
      - pgsql-app:/var/lib/postgresql
      - ./docker/postgresql/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app

volumes:
  pgsql-app:
    driver: local

networks:
  app:
    driver: bridge
  dev-shared:
    external: true
