# ---- Docker Build Configuration ----
# This file is auto-loaded by deploy.sh
# Uncomment and change values as needed for your project

# Project
IMAGE_NAME="my-app"
GHCR_REPO="ghcr.io/your-user/${IMAGE_NAME}"
DOCKERHUB_REPO="your-user/${IMAGE_NAME}"

# ---- Selected extensions for this project ----
# (space-separated, must match names from the registry below)
DB_DRIVERS="pgsql"
EXTRA_PECL="redis"
EXTRA_EXT=""

# ---- Public Vite variables embedded into the frontend bundle at build time ----
# Prefer setting production-safe values here instead of relying on the local .env.
VITE_APP_NAME=""
VITE_PUSHER_APP_KEY=""
VITE_PUSHER_APP_CLUSTER="mt1"
VITE_PUSHER_HOST=""
VITE_PUSHER_PORT="443"
VITE_PUSHER_SCHEME="https"

# ---- Extension Registry ----
# Format: "name:Description" — add new entries here to make them available
# in the wizard and CLI. The Dockerfile must also have a matching case entry.

AVAILABLE_DB=(
    "mysql:MySQL / MariaDB"
    "pgsql:PostgreSQL"
    "sqlite:SQLite"
)

AVAILABLE_PECL=(
    "redis:Redis cache driver"
    "grpc:gRPC client extension"
    "protobuf:Protocol Buffers runtime"
    "mongodb:MongoDB driver"
    "imagick:Image manipulation"
    "memcached:Memcached cache driver"
)

AVAILABLE_EXT=(
    "gmp:GNU Multiple Precision"
    "soap:SOAP web services"
    "sockets:Socket programming"
    "calendar:Calendar functions"
)