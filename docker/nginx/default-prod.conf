# =============================================================================
# Rate Limiting Zones
# =============================================================================
limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:30m;

# =============================================================================
# Bad Bots Detection (User-Agent based)
# =============================================================================
map "$uri:$http_user_agent" $bad_bot {
    default 0;

    # Trusted webhooks
    ~*^/webhooks/kick:.*go-http-client 0;
    ~*^/webhooks/twitch/eventsub:.* 0;

    # SEO Crawlers (aggressive/unwanted)
    ~*(?i)(ahrefsbot|semrushbot|dotbot|mj12bot|blexbot|linkdexbot|gigabot) 1;
    ~*(?i)(megaindex|seokicks|siteexplorer|bomberbot|baiduspider) 1;
    ~*(?i)(yandexbot|sogou|exabot|majestic|serpstatbot|dataforseo) 1;

    # Security Scanners & Penetration Tools
    ~*(?i)(sqlmap|nikto|nmap|masscan|zgrab|nuclei|httpx) 1;
    ~*(?i)(wpscan|joomscan|droopescan|cmsmap|wapiti) 1;
    ~*(?i)(acunetix|nessus|openvas|qualys|burpsuite) 1;
    ~*(?i)(dirbuster|gobuster|dirb|ffuf|feroxbuster) 1;

    # Generic HTTP Libraries (often used by bots/scrapers)
    ~*(?i)(python-requests|python-urllib|python-httpx|aiohttp) 1;
    ~*(?i)(go-http-client|java\/|okhttp) 1;
    ~*(?i)(scrapy|httpclient|libwww|lwp-|mechanize) 1;
    ~*(?i)(petalbot|bytespider|amazonbot|gptbot|claudebot) 1;
    ~*(?i)(ccbot|commoncrawl|ia_archiver|archive\.org) 1;

    # Reconnaissance Tools
    ~*(?i)(censys|shodan|internetmeasurement|onyphe|binaryedge) 1;

    # Empty User-Agent
    "" 1;
}

# =============================================================================
# Block suspicious HTTP methods
# =============================================================================
map $request_method $bad_method {
    default 0;
    ~*(?i)(TRACE|TRACK|DEBUG|CONNECT) 1;
}

server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php;

    charset utf-8;

    # =========================================================================
    # Real IP (behind Traefik / Docker network)
    # =========================================================================
    real_ip_header X-Forwarded-For;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 192.168.0.0/16;

    # =========================================================================
    # Security Headers
    # =========================================================================
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(self), camera=()" always;

    # =========================================================================
    # Bot & Security Blocks
    # =========================================================================
    if ($bad_bot) {
        return 403;
    }

    if ($bad_method) {
        return 405;
    }

    # Block .env, .git, .docker and other sensitive paths
    location ~* ^/(\.env|\.git|\.svn|\.htaccess|\.htpasswd|\.aws|\.docker|\.kube) {
        return 403;
    }

    # Block CMS scanner paths
    location ~* ^/(wp-admin|wp-content|wp-includes|wp-login|wordpress|phpmyadmin|adminer|phpinfo|pma|mysql|myadmin) {
        return 403;
    }

    # Block common config files
    location ~* (config\.php|settings\.php|local\.xml|parameters\.yml|database\.yml|\.ini$|\.log$|\.conf$) {
        return 403;
    }

    # Block vulnerability scan patterns
    location ~* (eval\(|base64_|union.*select|concat\(|\/etc\/passwd|\.\.\/|<script|%3Cscript) {
        return 403;
    }

    # Block backup/temp file extensions
    location ~* \.(bak|old|orig|save|swp|sql|tar|gz|zip|rar|7z|dump|db|sqlite)$ {
        return 403;
    }

    # Block shell/backdoor extensions
    location ~* \.(phtml|pht|php3|php4|php5|phps|cgi|pl|py|sh|bash|asp|aspx|jsp)$ {
        return 403;
    }

    # =========================================================================
    # Rate Limited Routes
    # =========================================================================

    # Strict rate limit for auth routes
    location ~* ^/(login|register|password|forgot-password|reset-password|verify-email|two-factor) {
        limit_req zone=login burst=10 nodelay;
        limit_conn conn_limit 5;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # API rate limiting
    location ^~ /api/ {
        limit_req zone=api burst=50 nodelay;
        limit_conn conn_limit 30;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Livewire/Filament
    location ^~ /livewire {
        limit_req zone=api burst=100 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # =========================================================================
    # Main Location
    # =========================================================================
    location / {
        limit_req zone=general burst=20 nodelay;
        limit_conn conn_limit 20;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # =========================================================================
    # Static Assets
    # =========================================================================

    # Vite build assets (immutable, versioned)
    location ~* ^/build/assets/.*\.(js|css|woff|woff2|ttf|eot)$ {
        access_log off;
        log_not_found off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Images
    location ~* \.(jpg|jpeg|png|gif|bmp|svg|webp|avif|ico)$ {
        access_log off;
        log_not_found off;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        limit_req zone=general burst=50 nodelay;
    }

    # Fonts
    location ~* \.(eot|ttf|woff|woff2|otf)$ {
        access_log off;
        log_not_found off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # CSS/JS (non-versioned)
    location ~* \.(css|js)$ {
        access_log off;
        log_not_found off;
        expires 7d;
        add_header Cache-Control "public";
    }

    # =========================================================================
    # PHP Processing
    # =========================================================================
    location ~ \.php$ {
        # Block PHP execution in uploads/storage
        location ~* /(uploads|storage)/.*\.php$ {
            return 403;
        }

        try_files $uri =404;

        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        include fastcgi_params;

        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_param REMOTE_ADDR $remote_addr;

        # Timeouts
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
        fastcgi_connect_timeout 60;

        # Hide PHP version
        fastcgi_hide_header X-Powered-By;
    }

    # =========================================================================
    # Block Hidden Files (except .well-known)
    # =========================================================================
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # =========================================================================
    # Favicon & robots.txt
    # =========================================================================
    location = /favicon.ico {
        access_log off;
        log_not_found off;
        expires 30d;
    }

    location = /robots.txt {
        access_log off;
        log_not_found off;
        expires 1d;
    }

    # =========================================================================
    # Health Check (for Traefik / load balancers)
    # =========================================================================
    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "OK";
    }
}
