# PostgreSQL configuration optimized for Laravel

# CONNECTION SETTINGS
listen_addresses = '*'
port = 5432
max_connections = 200
superuser_reserved_connections = 3

# MEMORY SETTINGS
shared_buffers = 256MB                    # 25% da RAM disponivel
effective_cache_size = 1GB                # 75% da RAM disponivel
work_mem = 8MB
maintenance_work_mem = 64MB
dynamic_shared_memory_type = posix

# QUERY PLANNER
random_page_cost = 1.1                   # Otimizado para SSD
effective_io_concurrency = 200           # Otimizado para SSD
cpu_tuple_cost = 0.01
cpu_index_tuple_cost = 0.005
cpu_operator_cost = 0.0025

# WAL SETTINGS
wal_buffers = 16MB
checkpoint_completion_target = 0.9
wal_writer_delay = 200ms
commit_delay = 0
commit_siblings = 5

# LOGGING
log_destination = 'stderr'
logging_collector = off
log_min_messages = warning
log_min_error_statement = error
log_min_duration_statement = 2000        # Log queries > 2s
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_checkpoints = on
log_connections = off
log_disconnections = off
log_lock_waits = on

# AUTOVACUUM
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 60s
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05

# EXTENSIONS
shared_preload_libraries = 'pg_stat_statements'

# QUERY EXECUTION
max_locks_per_transaction = 256
enable_seqscan = on
enable_indexscan = on
enable_bitmapscan = on
enable_sort = on
enable_hashagg = on
enable_nestloop = on
enable_mergejoin = on
enable_hashjoin = on

# PERFORMANCE TRACKING
track_activities = on
track_counts = on
track_io_timing = on
track_functions = pl
